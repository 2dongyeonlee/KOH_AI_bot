name = "gong-ohyuk-bot"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
DIFY_API_URL = "https://api.dify.ai/v1"
# ADMIN_ID = ""  # 선택: 텔레그램 user ID 미리 지정 시 입력

[[kv_namespaces]]
binding = "BOT_KV"
id = "YOUR_KV_NAMESPACE_ID"          # wrangler kv namespace create BOT_KV 실행 후 교체
preview_id = "YOUR_KV_NAMESPACE_ID"  # 동일하게 교체
