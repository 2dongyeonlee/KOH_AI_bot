name = "koh-ai-bot"
main = "worker.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

# Secrets (set via `wrangler secret put`, never commit values here):
#   TELEGRAM_BOT_TOKEN, ANTHROPIC_API_KEY
#   Optional web search: wrangler secret put TAVILY_API_KEY

[vars]
BRIEFING_CHAT_ID = "-5156923133,-4930893560"
BOT_USERNAME = "KOH_AI_bot"

[triggers]
crons = ["0 0 * * 1-5"]

# KOH_AI_bot 전용 D1 DB입니다. Cloudflare 표시 이름은 6r-ai-db 그대로 사용합니다.
# dylee_ai_bot과 같은 database_id를 사용하면 안 됩니다.
[[d1_databases]]
binding = "DB"
database_name = "6r-ai-db"
database_id = "d55c7eaa-ef2e-40e5-8283-a50008dc5fb2"

[[kv_namespaces]]
binding = "PROMPT"
id = "3e6133b2fefd4c1088e14baed49fcd1e"
preview_id = "3e6133b2fefd4c1088e14baed49fcd1e"
